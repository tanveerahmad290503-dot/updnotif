{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto bg-neutral-900 p-8 rounded-2xl">
    <h2 class="text-xl font-semibold mb-6">Create Account</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <input name="name"
                   placeholder="Full Name"
                   required
                   class="w-full p-3 rounded-lg bg-neutral-800 focus:outline-none">
        </div>

        <div class="mb-4">
            <input name="username"
                   placeholder="Username"
                   required
                   class="w-full p-3 rounded-lg bg-neutral-800 focus:outline-none">
        </div>

        <div class="mb-6">
            <input name="password"
                   type="password"
                   placeholder="Password"
                   required
                   class="w-full p-3 rounded-lg bg-neutral-800 focus:outline-none">
        </div>

        <button type="submit"
                class="w-full bg-neutral-700 hover:bg-neutral-600 p-3 rounded-lg transition">
            Sign Up
        </button>
    </form>

    <div class="mt-6 text-sm text-neutral-400">
        Already have an account?
        <a href="/auth/login/" class="text-neutral-200 hover:underline">
            Login
        </a>
    </div>
</div>

{% endblock %}
